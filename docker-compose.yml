version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: slacksage
      POSTGRES_PASSWORD: slacksage
      POSTGRES_DB: slacksage
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/bot/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
